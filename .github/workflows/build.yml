name: Build Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create android folder automatically
        run: flutter create --platforms=android --org=com.screenshare --project-name=screenshare_app .

      - name: Use China Maven mirrors
        run: |
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = "../build"
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(":app")
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Patch AndroidManifest for permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:label="ScreenShare"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name="com.cloudwebrtc.webrtc.MediaProjectionService"
                      android:foregroundServiceType="mediaProjection"
                      android:exported="false" />

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Update minSdk
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK with retry
        run: |
          for i in 1 2 3; do
            flutter build apk --release --no-tree-shake-icons && break
            echo "Build attempt $i failed, retrying in 30 seconds..."
            sleep 30
          done

      - name: Find APK location
        run: |
          echo "===== 查找所有APK文件 ====="
          find build -name "*.apk" 2>/dev/null || echo "build目录下没找到"
          find . -name "*.apk" 2>/dev/null | grep -v node_modules || echo "全局没找到"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: screenshare-release
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
